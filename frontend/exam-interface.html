<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam In Progress - OEMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Exam specific styles */
        body { overflow: hidden; } /* Prevent scrolling of body */
        .exam-container { display: flex; height: 100vh; }
        .exam-sidebar { width: 280px; background: #f8f9fa; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; }
        .exam-main { flex: 1; display: flex; flex-direction: column; background: white; }
        
        .exam-header { height: 60px; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #fff; }
        .timer-badge { font-size: 1.2rem; font-weight: bold; color: #e53e3e; background: #fff5f5; padding: 5px 15px; border-radius: 4px; border: 1px solid #feb2b2; }
        
        .question-area { flex: 1; padding: 40px; overflow-y: auto; }
        .question-text { font-size: 1.3rem; margin-bottom: 30px; color: #2d3748; line-height: 1.6; }
        .options-grid { display: flex; flex-direction: column; gap: 15px; }
        .option-card { 
            padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 15px;
        }
        .option-card:hover { border-color: #cbd5e0; background: #f7fafc; }
        .option-card.selected { border-color: #3182ce; background: #ebf8ff; }
        .option-radio { width: 20px; height: 20px; }

        .exam-footer { height: 70px; border-top: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: #f8f9fa; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; overflow-y: auto; }
        .q-btn { 
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid #cbd5e0; background: white; cursor: pointer; font-weight: 600; color: #4a5568;
            display: flex; align-items: center; justify-content: center;
        }
        .q-btn.active { border-color: #3182ce; color: #3182ce; border-width: 2px; }
        .q-btn.answered { background-color: #48bb78; color: white; border-color: #48bb78; }
        
        /* Security Overlay */
        #security-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; color: white; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <div id="security-overlay">
        <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #e53e3e; margin-bottom: 20px;"></i>
        <h2>Security Violation Detected</h2>
        <p>You switched tabs or lost focus. This incident has been recorded.</p>
        <button onclick="resumeExam()" class="submit-btn" style="margin-top: 20px;">Resume Exam</button>
    </div>

    <div class="exam-container">
        <!-- Sidebar: Palette & Info -->
        <div class="exam-sidebar">
            <div style="padding: 20px; border-bottom: 1px solid #dee2e6;">
                <h3 style="margin: 0; font-size: 1.1rem;">Question Palette</h3>
                <div style="margin-top: 10px; font-size: 0.9rem; color: #718096;">
                    <span style="display:inline-block; width:10px; height:10px; background:#48bb78; border-radius:50%; margin-right:5px;"></span>Answered
                    <span style="display:inline-block; width:10px; height:10px; background:white; border:1px solid #cbd5e0; border-radius:50%; margin-left:10px; margin-right:5px;"></span>Pending
                </div>
            </div>
            <div class="palette-grid" id="question-palette">
                <!-- Populated by JS -->
            </div>
            <div style="margin-top: auto; padding: 20px; border-top: 1px solid #dee2e6;">
                <button onclick="submitExam()" class="submit-btn" style="width: 100%; background-color: #2c5282;">Submit Exam</button>
            </div>
        </div>

        <!-- Main Area -->
        <div class="exam-main">
            <div class="exam-header">
                <div style="font-weight: 600; font-size: 1.1rem;" id="exam-title">Loading Exam...</div>
                <div class="timer-badge" id="exam-timer">00:00:00</div>
            </div>

            <div class="question-area" id="question-container">
                <div class="spinner"></div>
            </div>

            <div class="exam-footer">
                <button id="btn-prev" class="submit-btn btn-secondary" onclick="prevQuestion()">Previous</button>
                <button id="btn-next" class="submit-btn" onclick="nextQuestion()">Next</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/exam-interface.js"></script>
</body>
</html>
