<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OEMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* CSS Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; width: 100%; }
        
        /* Layout */
        .login-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Left Side */
        .login-left {
            width: 40%;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
        }
        /* Subtle Pattern */
        .login-left::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.05;
            pointer-events: none;
        }
        
        .brand-logo { font-size: 2.5rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; z-index: 1; }
        .brand-desc { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; margin-bottom: 40px; max-width: 400px; z-index: 1; }
        .features { display: flex; flex-direction: column; gap: 20px; z-index: 1; }
        .feature-item { display: flex; align-items: center; gap: 15px; font-size: 1rem; }
        .feature-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        /* Right Side */
        .login-right {
            width: 60%;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Login Card */
        .login-card {
            background: white;
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            animation: fadeUp 0.5s ease-out;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header { margin-bottom: 30px; text-align: center; }
        .login-title { font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .login-subtitle { font-size: 14px; color: #64748b; }

        /* Form Elements */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 16px; pointer-events: none; }
        
        .form-input {
            width: 100%;
            height: 44px;
            padding-left: 40px; /* Space for icon */
            padding-right: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
            background: white;
        }
        .form-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        
        /* Password Toggle */
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; background: none; border: none; padding: 0; }
        .toggle-password:hover { color: #475569; }

        /* Options Row */
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 13px; }
        .remember-me { display: flex; align-items: center; gap: 6px; color: #475569; cursor: pointer; }
        .forgot-password { color: #2563eb; text-decoration: none; font-weight: 500; }
        .forgot-password:hover { text-decoration: underline; }

        /* Button */
        .login-btn {
            width: 100%;
            height: 44px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(37,99,235,0.25); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Error Message */
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none; /* Hidden by default */
            align-items: center;
            gap: 8px;
        }

        /* Footer */
        .login-footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-left { display: none; }
            .login-right { width: 100%; }
            .login-card { width: 90%; max-width: 400px; box-shadow: none; border: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left Side -->
        <div class="login-left">
            <div class="brand-logo"><i class="fas fa-graduation-cap"></i> OEMS</div>
            <p class="brand-desc">Secure Online Examination Platform.<br>Manage exams, monitor students, and analyze results efficiently.</p>
            <div class="features">
                <div class="feature-item"><div class="feature-icon"><i class="fas fa-shield-alt"></i></div><span>Secure Proctoring</span></div>
                <div class="feature-item"><div class="feature-icon"><i class="fas fa-video"></i></div><span>Real-time Monitoring</span></div>
                <div class="feature-item"><div class="feature-icon"><i class="fas fa-chart-line"></i></div><span>Instant Result Analytics</span></div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="login-right">
            <div class="login-card">
                <div class="login-header">
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Sign in to OEMS</p>
                </div>

                <div id="login-error" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="error-text">Invalid email or password</span>
                </div>

                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <div class="input-wrapper"><i class="fas fa-user-tag input-icon"></i>
                            <select id="role" class="form-input" required><option value="" disabled selected>Select Role</option><option value="Student">Student</option><option value="Teacher">Teacher</option><option value="Admin">Admin</option><option value="Super Admin">Super Admin</option></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="email" class="form-input" placeholder="name@example.com" required></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="toggleLoginPassword(this)"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-options"><label class="remember-me"><input type="checkbox" id="remember-me"> Remember me</label><a href="#" class="forgot-password">Forgot password?</a></div>
                    <button type="submit" class="login-btn" id="login-btn"><span id="btn-text">Sign In</span><i class="fas fa-arrow-right" id="btn-icon"></i><i class="fas fa-spinner fa-spin" id="btn-spinner" style="display: none;"></i></button>
                </form>
            </div>
            <div class="login-footer">&copy; 2026 OEMS — Online Examination Management System</div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
