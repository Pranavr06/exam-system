<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OEMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="login-container">
        <!-- Left Side -->
        <div class="login-left">
            <div class="brand-logo"><i class="fas fa-graduation-cap"></i> OEMS</div>
            <p class="brand-desc">Secure Online Examination Platform.<br>Manage exams, monitor students, and analyze results efficiently.</p>
            <div class="features">
                <div class="feature-item"><div class="feature-icon"><i class="fas fa-shield-alt"></i></div><span>Secure Proctoring</span></div>
                <div class="feature-item"><div class="feature-icon"><i class="fas fa-video"></i></div><span>Real-time Monitoring</span></div>
                <div class="feature-item"><div class="feature-icon"><i class="fas fa-chart-line"></i></div><span>Instant Result Analytics</span></div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="login-right">
            <div class="login-card">
                <div class="login-header">
                    <div class="mobile-logo"><i class="fas fa-graduation-cap"></i> OEMS</div>
                    <h1 class="login-title">Welcome Back</h1>
                    <p class="login-subtitle">Sign in to OEMS</p>
                </div>

                <div id="login-error" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> <span id="error-text">Invalid email or password</span>
                </div>

                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <div class="input-wrapper"><i class="fas fa-user-tag input-icon"></i>
                            <select id="role" class="form-input" required><option value="" disabled selected>Select Role</option><option value="Student">Student</option><option value="Teacher">Teacher</option><option value="Admin">Admin</option><option value="Super Admin">Super Admin</option></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper"><i class="fas fa-envelope input-icon"></i><input type="email" id="email" class="form-input" placeholder="name@example.com" required></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper"><i class="fas fa-lock input-icon"></i><input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="toggleLoginPassword(this)"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-options"><label class="remember-me"><input type="checkbox" id="remember-me"> Remember me</label><a href="#" class="forgot-password" onclick="showForgotPasswordModal(event)">Forgot password?</a></div>
                    <button type="submit" class="login-btn" id="login-btn"><span id="btn-text">Sign In</span><i class="fas fa-arrow-right" id="btn-icon"></i><i class="fas fa-spinner fa-spin" id="btn-spinner" style="display: none;"></i></button>
                </form>
            </div>
            <div class="login-footer">&copy; <span id="current-year"></span> OEMS — Online Examination Management System</div>
            <script>document.getElementById("current-year").textContent = new Date().getFullYear();</script>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
