name: Keep Render Backend Awake

on:
  schedule:
    # Run every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: curl -sSf https://exam-system-2k9t.onrender.com/ > /dev/null || echo "Ping failed"
